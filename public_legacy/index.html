<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Asesorías Consultoría</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #3b82f6;
            
            --verde-text: #34d399;
            --rojo-text: #f87171;
            --naranja-text: #fbbf24;
            --gris-text: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
        }

        header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
            background: var(--surface);
        }

        h1 { font-size: 1.5rem; color: var(--text-main); }

        main {
            padding: 0 1.5rem 3rem 1.5rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .client-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .client-header { margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); padding-bottom: 1.25rem; }
        .client-name { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.75rem; }
        
        .emp-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .emp-yes { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.4); }
        .emp-no { background: rgba(148, 163, 184, 0.2); color: #cbd5e1; border: 1px solid rgba(148, 163, 184, 0.4); }

        .section-title {
            font-size: 0.95rem;
            text-transform: uppercase;
            color: var(--text-dim);
            font-weight: 700;
            margin-bottom: 12px;
            margin-top: 24px;
            letter-spacing: 1px;
        }

        /* Alertas List */
        .alert-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: border-color 0.2s;
        }
        .alert-item:hover { border-color: rgba(255,255,255,0.1); }
        .alert-name { font-size: 0.95rem; font-weight: 500; margin-right: 12px; }
        
        .clickable-title {
            cursor: pointer;
            color: var(--accent);
            text-decoration: underline;
            text-decoration-style: dotted;
            text-underline-offset: 4px;
            transition: color 0.2s;
        }
        .clickable-title:hover { color: #93c5fd; }
        
        .status-select { 
            font-size: 0.85rem; 
            padding: 6px 10px; 
            border-radius: 6px; 
            font-weight: bold; 
            text-transform: uppercase; 
            cursor: pointer;
            border: 1px solid var(--border);
            background-color: #0f172a;
            outline: none;
            max-width: 140px;
        }

        .val-Verde { color: var(--verde-text); border-color: var(--verde-text); }
        .val-Rojo { color: var(--rojo-text); border-color: var(--rojo-text); }
        .val-Naranja { color: var(--naranja-text); border-color: var(--naranja-text); }
        .val-Pendiente_Asesor { color: var(--gris-text); border-color: var(--gris-text); }

        /* Subvencions List */
        .sub-item {
            background: rgba(255,255,255,0.02);
            border: 1px dashed var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }
        .sub-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 6px; display: flex; justify-content: space-between; }
        .sub-req { font-size: 0.8rem; color: var(--text-dim); }
        .sub-Solicitada { color: #10b981; font-size: 0.8rem; padding: 2px 6px; border-radius: 4px; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); }
        .sub-Abierta { color: #60a5fa; font-size: 0.8rem; padding: 2px 6px; border-radius: 4px; background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); }
        .sub-Concedida { color: #f59e0b; font-size: 0.8rem; padding: 2px 6px; border-radius: 4px; background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }
        
        .empty-message { text-align: center; color: var(--text-dim); padding: 1rem; border: 1px dashed var(--border); border-radius: 8px; }

        /* Modal CSS */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 480px;
            transform: translateY(20px);
            transition: transform 0.3s ease-out;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .modal-title { font-size: 1.2rem; color: #60a5fa; margin-bottom: 1.2rem; font-weight: bold; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .modal-steps { color: var(--text-main); line-height: 1.7; font-size: 0.95rem; white-space: pre-wrap; margin-bottom: 1.5rem; }
        
        /* New Animated Download Button */
        .download-btn { 
            display: block; 
            background: #10b981; 
            color: #ffffff; 
            font-weight: 700; 
            padding: 14px; 
            border-radius: 8px; 
            text-align: center; 
            text-decoration: none; 
            margin-bottom: 1.5rem; 
            transition: background 0.2s, transform 0.1s; 
        }
        .download-btn:hover { background: #059669; }
        .download-btn:active { transform: scale(0.98); }

        .modal-close {
            background: rgba(255,255,255,0.08);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.15); }

    </style>
</head>
<body>

    <header>
        <h1>Radar. Consultoría Normativa</h1>
    </header>

    <main id="app">
        <div style="text-align:center; color: var(--text-dim);">Evaluando bases de datos de clientes...</div>
    </main>

    <!-- HTML MODAL -->
    <div id="modal" class="modal-overlay" onclick="closeModalOutside(event)">
        <div class="modal-box">
            <div id="modal-title" class="modal-title">Título</div>
            <div id="modal-steps" class="modal-steps">Pasos a seguir...</div>
            <a id="modal-download" href="#" download class="download-btn" style="display:none;">📥 DESCARGAR PLANTILLA (.DOCX / .PDF)</a>
            <button class="modal-close" onclick="closeModal()">Cerrar Manual</button>
        </div>
    </div>

    <script>
        function openModal(title, text, plantilla) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-steps').textContent = text || 'Sin ruta de pasos definida nativamente.';
            
            const btnDownload = document.getElementById('modal-download');
            if(plantilla && plantilla !== 'undefined' && plantilla !== 'null') {
                btnDownload.style.display = 'block';
                btnDownload.href = '/templates/' + plantilla;
            } else {
                btnDownload.style.display = 'none';
            }

            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function closeModalOutside(event) {
            if (event.target.id === 'modal') {
                closeModal();
            }
        }

        function escapeHTML(str) {
            if(!str) return '';
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        async function updateAlertaState(alertaId, selectEl) {
            const nuevoEstado = selectEl.value;
            selectEl.className = 'status-select val-' + nuevoEstado;
            
            try {
                const res = await fetch('/api/alertas/' + alertaId, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ estado: nuevoEstado })
                });
                
                if(!res.ok) {
                    throw new Error('Error HTTP: ' + res.status);
                }
            } catch(e) {
                console.error('Update failed:', e);
                const errDiv = document.createElement('div');
                errDiv.style.color = '#ef4444';
                errDiv.style.fontSize = '0.8rem';
                errDiv.style.marginTop = '4px';
                errDiv.style.textAlign = 'right';
                errDiv.innerText = 'Error al sincronizar. Revisa la conexión.';
                selectEl.parentNode.appendChild(errDiv);
                setTimeout(() => errDiv.remove(), 4000);
            }
        }

        async function cargarDatos() {
            const app = document.getElementById('app');
            try {
                const req = await fetch('/api/asesorias');
                if(!req.ok) throw new Error('Falló el fetch: ' + req.status);
                const data = await req.json();

                let html = '';
                let hasClients = false;

                data.forEach(org => {
                    if(org.clients && org.clients.length > 0) {
                        org.clients.forEach(client => {
                            hasClients = true;
                            
                            const isAutonomo = (client.tiene_empleados === 0);
                            const badgeClass = isAutonomo ? 'emp-no' : 'emp-yes';
                            const badgeText = isAutonomo ? 'SIN EMPLEADOS' : `👥 TIENE EMPLEADOS: ${client.numero_empleados}`;

                            // BLOQUE ALERTAS
                            let alertsHtml = '';
                            if(client.alertas && client.alertas.length > 0) {
                                client.alertas.forEach(alerta => {
                                    const estadoValido = ['Verde', 'Rojo', 'Naranja', 'Pendiente_Asesor'].includes(alerta.estado) ? alerta.estado : 'Pendiente_Asesor';
                                    
                                    alertsHtml += `
                                        <div class="alert-item">
                                            <div class="alert-name clickable-title" onclick="openModal('${escapeHTML(alerta.tipo_alerta)}', '${escapeHTML(alerta.guia_pasos || '')}', '${escapeHTML(alerta.archivo_plantilla || '')}')">
                                                ${escapeHTML(alerta.tipo_alerta)}
                                            </div>
                                            <select class="status-select val-${estadoValido}" onchange="updateAlertaState(${alerta.id}, this)">
                                                <option value="Verde" ${estadoValido === 'Verde' ? 'selected' : ''}>Verde</option>
                                                <option value="Rojo" ${estadoValido === 'Rojo' ? 'selected' : ''}>Rojo</option>
                                                <option value="Naranja" ${estadoValido === 'Naranja' ? 'selected' : ''}>Naranja</option>
                                                <option value="Pendiente_Asesor" ${estadoValido === 'Pendiente_Asesor' ? 'selected' : ''}>S/ Eval</option>
                                            </select>
                                        </div>
                                    `;
                                });
                            } else {
                                alertsHtml = '<div class="empty-message">No hay obligaciones detectadas.</div>';
                            }

                            // BLOQUE SUBVENCIONES
                            let subsHtml = '';
                            if(client.subvenciones && client.subvenciones.length > 0) {
                                client.subvenciones.forEach(sub => {
                                    subsHtml += `
                                        <div class="sub-item">
                                            <div class="sub-title">
                                                <span>${escapeHTML(sub.titulo_ayuda)}</span>
                                                <span class="sub-${escapeHTML(sub.estado)}">${escapeHTML(sub.estado)}</span>
                                            </div>
                                            <div class="sub-req">Req: ${escapeHTML(sub.requisitos)}</div>
                                        </div>
                                    `;
                                });
                            } else {
                                subsHtml = '<div class="empty-message">No existen expedientes de subvención o ayudas en trámite.</div>';
                            }

                            html += `
                                <div class="client-card">
                                    <div class="client-header">
                                        <div class="client-name">${escapeHTML(client.nombre)}</div>
                                        <div class="emp-badge ${badgeClass}">${escapeHTML(badgeText)}</div>
                                        <div style="font-size:0.85rem; color:var(--text-dim); margin-top:8px;">
                                            CNAE Sectorial: ${escapeHTML(client.cnae || 'N/A')}
                                        </div>
                                    </div>
                                    
                                    <div class="section-title">Normativas & Alertas Compliance</div>
                                    ${alertsHtml}

                                    <div class="section-title">Ayudas & Expedientes Subvencionales</div>
                                    ${subsHtml}
                                </div>
                            `;
                        });
                    }
                });

                if(!hasClients) {
                    html = '<div class="empty-message">No se encontró panel base.</div>';
                }

                app.innerHTML = html;

            } catch (err) {
                console.error(err);
                app.innerHTML = `
                    <div style="text-align:center; padding:2rem; border:1px solid #ef4444; border-radius:8px; color:#ef4444; margin-top:2rem;">
                        <strong>Fallo estructural</strong><br>
                        ${escapeHTML(err.message)}<br>
                        Asegúrate de encender manualmente el servidor (<code>node server.js</code>).
                    </div>
                `;
            }
        }

        window.onload = cargarDatos;

        // Listen for Esc key to close modal
        document.addEventListener('keydown', function(event) {
            if(event.key === 'Escape') closeModal();
        });

    </script>
</body>
</html>
